# tags.yaml — User-editable tag configuration for contextgraph
# Changes are hot-reloaded; no service restart needed.
#
# Each tag entry:
#   name: str — tag identifier (lowercase, hyphens OK)
#   description: str — human-readable purpose
#   keywords: list[str] — substring matches (case-insensitive, word-boundary)
#   patterns: list[str] — regex patterns (applied to combined user+assistant text)
#   requires_all: bool — if true, ALL keywords must match (default: false = any)
#   confidence: float — override confidence score (default: 1.0)
#   enabled: bool — false = tag exists but is disabled (default: true)

version: 1

tags:

  # ── General AI assistant tags ────────────────────────────────────────────

  - name: code
    description: Message contains or discusses code
    keywords:
      - coding
      - codebase
      - refactor
      - debug
      - compile
      - syntax
      - function
      - variable
      - repository
      - commit
      - pull request
      - merge
      - branch
      - git
      - github
      - source code
      - implementation
      - bug fix
      - test suite
      - unit test
      - pip install
      - pip3 install
    patterns:
      - "```[\\s\\S]*?```"   # code block
      - "^    \\S"            # 4-space indent
    confidence: 1.0

